<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test</title>
</head>
<body style="background:black;color:white;text-align:center;margin-top:100px;font-size:30px;">

<button onclick="generateFortune()" style="font-size:25px;">Натисни</button>

<p id="fortune"></p>

<script>
function generateFortune() {
    const fortunes = [
        "Работи.",
        "Късмет!",
        "Това е тест."
    ];
    
    const randomIndex = Math.floor(Math.random() * fortunes.length);
    document.getElementById("fortune").innerText = fortunes[randomIndex];
}
</script>

</body>
</html>
