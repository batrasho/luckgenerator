<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8" />
<title>Генератор на късметчета</title>

<style>
  body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#f7c948,#ff8c42);
    overflow:hidden;
  }

  .container{
    position:relative;
    text-align:center;
    background:white;
    padding:50px 60px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    max-width:560px;
    width:min(560px, calc(100vw - 40px));
    z-index:2;
  }

  h2{
    margin:0 0 30px;
    font-size:28px;
  }

  button{
    padding:14px 28px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:#ff8c42;
    color:white;
    cursor:pointer;
    transition:all 0.25s ease;
  }
  button:hover{
    background:#ff6b1a;
    transform:scale(1.05);
  }

  #fortune{
    font-size:22px;
    margin-top:30px;
    line-height:1.4;
    color:#333;
    min-height:2.2em;
  }

  .history{
    margin-top:18px;
    padding-top:14px;
    border-top:1px dashed rgba(0,0,0,0.12);
    text-align:left;
  }
  .history-title{
    font-size:12px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:rgba(0,0,0,0.55);
    margin-bottom:10px;
  }
  #historyList{
    margin:0;
    padding-left:18px;
  }
  #historyList li{
    font-size:14px;
    color:rgba(0,0,0,0.65);
    line-height:1.35;
    margin:6px 0;
  }

  /* Confetti canvas */
  #confettiCanvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:1;
    pointer-events:none;
  }
</style>
</head>

<body>
<canvas id="confettiCanvas"></canvas>

<div class="container">
  <h2>🍀 Генератор на късметчета</h2>

  <button onclick="generateFortune()">Изтегли късмет</button>

  <p id="fortune"></p>

  <div class="history">
    <div class="history-title">Предишни 3 късметчета</div>
    <ol id="historyList"></ol>
  </div>
</div>

<script>
const fortunes = [
  "Днес ще получиш добра новина.",
  "Очаква те приятна изненада.",
  "Нова възможност ще се появи съвсем скоро.",

  "Смелостта ти ще бъде възнаградена.",

  "Неочаквана среща ще ти донесе радост.",

  "Усилията ти няма да останат незабелязани.",

  "Денят ще завърши по-добре, отколкото очакваш.",
  "Късметът обича смелите.",
  "Днес е началото на нещо по-голямо.",
  "Ще получиш вдъхновение.",
  "Предстои ти положителна промяна.",
  "Ще намериш точните думи в точния момент.",
  "Очаква те спокойствие.",
  "Скоро ще направиш правилния избор.",
  "Добра новина е на път.",
  "Съдбата ти готви изненада.",
  "Ще срещнеш човек, който ще ти помогне.",
  "Днес ще направиш нещо важно.",
  "Ще постигнеш малка, но значима цел.",
  "Ще се почувстваш уверен.",
  "Очаква те неочакван подарък.",
  "Нещо старо ще се превърне в нов шанс.",
  "Ще получиш благодарност.",
  "Скоро ще ти олекне.",
  "Ще намериш изгубено вдъхновение.",
  "Предстои ти успех в начинание.",
  "Ще получиш шанс да блеснеш.",
  "Днес е ден за ново начало.",
  "Ще чуеш думи, които чакаш отдавна.",
  "Малък риск ще донесе голяма награда.",
  "Очаква те късмет в правилния момент.",
  "Ще усетиш напредък.",
  "Скоро ще имаш повод за усмивка.",

  "Една идея ще промени посоката ти.",

  "Скоро ще видиш резултат от усилията си.",
  "Очаква те добро стечение на обстоятелствата.",
  "Ще намериш нова мотивация.",
  "Късметът работи в твоя полза.",
  "Ще получиш добър съвет.",
  "Скоро ще чуеш добри новини.",
  "Ще усетиш спокойствие.",
  "Очаква те напредък.",
  "Ще намериш правилното решение.",
  "Скоро ще имаш малка победа.",
  "Ще получиш признание.",
  "Очаква те светъл момент.",
  "Днес е твой ден.",
  "Ще откриеш нова възможност.",
  "Скоро ще имаш повод за гордост.",
  "Ще направиш крачка напред.",
  "Очаква те нещо положително.",
  "Ще получиш шанс за растеж.",
  "Скоро ще се появи нова перспектива.",
  "Ще усетиш прилив на енергия.",
  "Очаква те баланс.",
  "Ще направиш правилен избор.",
  "Скоро ще видиш промяна към добро."
];

let lastIndex = -1;

// пазим последните 4: [текущ, предишен1, предишен2, предишен3]
const recent = [];

function renderHistory(){
  const list = document.getElementById("historyList");
  list.innerHTML = "";

  const historyOnly = recent.slice(1, 4);
  if (historyOnly.length === 0) return;

  historyOnly.forEach(txt => {
    const li = document.createElement("li");
    li.textContent = txt;
    list.appendChild(li);
  });
}

function generateFortune() {
  let randomIndex;
  do {
    randomIndex = Math.floor(Math.random() * fortunes.length);
  } while (randomIndex === lastIndex);

  lastIndex = randomIndex;

  const text = fortunes[randomIndex];
  document.getElementById("fortune").innerText = text;

  // update history
  recent.unshift(text);
  recent.splice(4); // max 4 елемента
  renderHistory();

  // confetti
  confettiBurst();
}

document.addEventListener("keydown", function(event) {
  if (event.code === "Space" || event.code === "Enter") {
    generateFortune();
  }
});

/* =======================
   Confetti (canvas)
   ======================= */
const canvas = document.getElementById("confettiCanvas");
const ctx = canvas.getContext("2d");
let W, H;

function resizeCanvas(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

let confetti = [];
let animId = null;

function rand(min, max){ return Math.random() * (max - min) + min; }

function createConfettiPiece(){
  return {
    x: rand(0, W),
    y: rand(-20, -H * 0.2),
    w: rand(6, 12),
    h: rand(8, 16),
    vx: rand(-2.2, 2.2),
    vy: rand(3.0, 6.5),
    rot: rand(0, Math.PI * 2),
    vr: rand(-0.2, 0.2),
    color: `hsl(${Math.floor(rand(0, 360))}, 85%, 55%)`,
    alpha: 1
  };
}

function confettiBurst(){
  // добавяме нови парченца при всяко теглене
  for(let i=0; i<140; i++){
    confetti.push(createConfettiPiece());
  }

  if (!animId) animateConfetti();

  // стоп след малко, ако няма парченца (и чистим)
  setTimeout(() => {
    // оставяме да се доизпадат и да изчезнат
    setTimeout(() => {
      if (confetti.length === 0 && animId){
        cancelAnimationFrame(animId);
        animId = null;
        ctx.clearRect(0,0,W,H);
      }
    }, 1000);
  }, 400);
}

function animateConfetti(){
  animId = requestAnimationFrame(animateConfetti);
  ctx.clearRect(0, 0, W, H);

  const gravity = 0.06;
  const drag = 0.995;

  confetti = confetti.filter(p => p.y < H + 40 && p.alpha > 0.02);

  for (const p of confetti){
    p.vy += gravity;
    p.vx *= drag;
    p.vy *= drag;

    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.vr;

    // лек fade към края
    if (p.y > H * 0.75) p.alpha *= 0.985;

    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.restore();
  }

  if (confetti.length === 0){
    cancelAnimationFrame(animId);
    animId = null;
    ctx.clearRect(0,0,W,H);
  }
}
</script>
</body>
</html>
